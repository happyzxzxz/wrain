name: "Build and Cache"
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v25
    - uses: cachix/cachix-action@v14
      with:
        name: wrain
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - run: nix build .
